        <div class="status-bar">
            <span>Charles Tang | Charles Tang&#39;s Personal Portfolio</span>
            <span>10:18:50</span>
        </div>
    </div>
    
    
    <button class="floating-theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <span id="theme-icon">🌙</span>
    </button>
    
    <script>
        
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            const currentTheme = body.getAttribute('data-theme') || 'dark';
            
            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'light');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }
        
        
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const themeIcon = document.getElementById('theme-icon');
            
            document.body.setAttribute('data-theme', savedTheme);
            themeIcon.textContent = savedTheme === 'light' ? '☀️' : '🌙';
        });
        
        
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
            const statusTime = document.querySelector('.status-bar span:last-child');
            if (statusTime) {
                statusTime.textContent = timeStr;
            }
        }
        
        setInterval(updateTime, 1000);
        
        
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.querySelector('.content');
            if (content) {
                content.style.opacity = '0';
                setTimeout(() => {
                    content.style.transition = 'opacity 0.5s ease';
                    content.style.opacity = '1';
                }, 100);
            }
        });
    </script>
</body>
