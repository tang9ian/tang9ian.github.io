    <button class="floating-theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark/light theme">
        <span id="theme-icon">🌙</span>
    </button>

    <script>
        
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            const currentTheme = body.getAttribute('data-theme') || 'dark';

            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'light');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }

        
        function toggleFullscreen() {
            var isFullscreen = document.body.classList.toggle('fullscreen');
            sessionStorage.setItem('terminal-fullscreen', isFullscreen);
        }

        
        var ZOOM_MIN = 80, ZOOM_MAX = 150, ZOOM_STEP = 10, ZOOM_DEFAULT = 100;

        function getZoom() {
            return parseInt(localStorage.getItem('content-zoom') || ZOOM_DEFAULT);
        }

        function setZoom(level) {
            level = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, level));
            var tc = document.querySelector('.terminal-content');
            var zl = document.querySelector('.zoom-level');
            var btns = document.querySelectorAll('.zoom-btn');
            if (tc) tc.style.fontSize = level + '%';
            if (zl) zl.textContent = level + '%';
            if (btns.length === 2) {
                btns[0].disabled = (level <= ZOOM_MIN);
                btns[1].disabled = (level >= ZOOM_MAX);
            }
            if (level === ZOOM_DEFAULT) localStorage.removeItem('content-zoom');
            else localStorage.setItem('content-zoom', level);
        }

        function zoomIn() { setZoom(getZoom() + ZOOM_STEP); }
        function zoomOut() { setZoom(getZoom() - ZOOM_STEP); }
        function zoomReset() { setZoom(ZOOM_DEFAULT); }

        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.body.classList.contains('fullscreen')) {
                toggleFullscreen();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            
            var savedTheme = localStorage.getItem('theme') || 'dark';
            var themeIcon = document.getElementById('theme-icon');
            document.body.setAttribute('data-theme', savedTheme);
            themeIcon.textContent = savedTheme === 'light' ? '☀️' : '🌙';

            
            setZoom(getZoom());

            
            var content = document.querySelector('.content');
            if (content) {
                content.style.opacity = '0';
                setTimeout(function() {
                    content.style.transition = 'opacity 0.5s ease';
                    content.style.opacity = '1';
                }, 100);
            }

            
            var statusTime = document.querySelector('.status-time');
            if (statusTime) {
                function updateTime() {
                    statusTime.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
                }
                updateTime();
                setInterval(updateTime, 1000);
            }
        });
    </script>
